services:
  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment: 
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes: 
      - pgdata:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    ports:
      - 6379:6379
  backend:
    build: ./backend
    ports: 
      - 8000:8000
    depends_on:
      - redis
      - db
  frontend:
    build: ./frontend
    ports:
      - 5173:5173
    depends_on:
      - backend
volumes:
  pgdata: